# ============================================================
# VATM ATCC Long Thành — Web Portal Stack (VM2: 192.168.100.11)
# Docker Compose v2 | FastAPI + Ansible Runner + Redis + Nginx
# ============================================================

services:

  # ─────────────────────────────────────────────────────────
  # 1. FASTAPI — Backend Web Portal
  # ─────────────────────────────────────────────────────────
  fastapi-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vatm_fastapi
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - REPORT_DIR=/opt/vatm/reports
      - ANSIBLE_DIR=/opt/vatm/ansible
      # Grafana URL để tạo iframe embed links
      - GRAFANA_URL=http://192.168.100.10:3000
      # Prometheus URL để query trực tiếp
      - PROMETHEUS_URL=http://192.168.100.10:9090
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app:ro                              # Source code (read-only)
      - ansible_workspace:/opt/vatm/ansible        # Ansible playbooks
      - reports_data:/opt/vatm/reports             # Báo cáo JSON/Markdown
      - ansible_ssh_keys:/root/.ssh:ro             # SSH keys cho Nokia (read-only)
    networks:
      - vatm_web
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────
  # 2. REDIS — Task queue (trạng thái Ansible jobs)
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: vatm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vatm_web
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────
  # 3. NGINX — Reverse proxy + phục vụ frontend
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    container_name: vatm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"      # Dự phòng SSL (tự ký cho lab)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro              # Self-signed cert cho lab
      - reports_data:/var/www/reports:ro           # Báo cáo static files
    networks:
      - vatm_web
    depends_on:
      - fastapi-web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────
volumes:
  redis_data:
    name: vatm_redis_data
  reports_data:
    name: vatm_reports_data
  ansible_workspace:
    name: vatm_ansible_workspace
  ansible_ssh_keys:
    name: vatm_ansible_ssh_keys

# ─────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────
networks:
  vatm_web:
    name: vatm_web_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
