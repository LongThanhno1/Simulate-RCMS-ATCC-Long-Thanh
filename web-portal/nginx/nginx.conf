# ============================================================
# VATM ATCC Long Thành — Nginx Reverse Proxy Config
# Proxy: FastAPI :8000 | Allow CORS từ Grafana iframe
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ─────────────────────────────────────────────────────
    # Server block chính
    # ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name 192.168.100.11 vatm-monitor.local;

        # ── Health check endpoint ──
        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        # ── FastAPI Backend — toàn bộ API ──
        location /api/ {
            proxy_pass         http://fastapi-web:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── FastAPI — WebSocket (live status) ──
        location /ws/ {
            proxy_pass         http://fastapi-web:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # ── Static reports (Markdown/Excel) ──
        location /reports/ {
            alias /var/www/reports/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        # ── Frontend + API root (FastAPI serve static) ──
        location / {
            proxy_pass         http://fastapi-web:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;

            # ── CORS — cho phép Grafana iframe từ VM1 ──
            add_header 'Access-Control-Allow-Origin'  'http://192.168.100.10:3000' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'X-Frame-Options' 'SAMEORIGIN' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
    }
}
