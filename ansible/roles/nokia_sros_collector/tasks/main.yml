---
# ============================================================
# Role: nokia_sros_collector
# Mục đích: Thu thập metrics từ Nokia SR OS qua SSH CLI
# Áp dụng: Thiết bị thực (Nokia 7250 IXR-e, Nokia 7705 SAR-8)
# ============================================================

# --- Bước 1: Kiểm tra kết nối SSH ---
- name: "[{{ inventory_hostname }}] Kiểm tra kết nối SSH"
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ ansible_port | default(22) }}"
    timeout: 15
    state: started
  delegate_to: localhost
  register: ssh_check
  ignore_errors: true

- name: "[{{ inventory_hostname }}] Bỏ qua nếu SSH không kết nối được"
  meta: end_host
  when: ssh_check.failed is defined and ssh_check.failed

# --- Bước 2: Thu thập System Information ---
- name: "[{{ inventory_hostname }}] Thu thập system information"
  raw: "{{ sros_commands.system_info }}"
  register: raw_system_info
  ignore_errors: true
  timeout: "{{ sros_cli_timeout }}"

# --- Bước 3: Thu thập trạng thái Port ---
- name: "[{{ inventory_hostname }}] Thu thập trạng thái tất cả ports"
  raw: "show port"
  register: raw_port_summary
  ignore_errors: true
  timeout: "{{ sros_cli_timeout }}"

- name: "[{{ inventory_hostname }}] Thu thập chi tiết từng port được monitor"
  raw: "show port {{ item }} detail"
  register: raw_port_details
  loop: "{{ monitor_ports }}"
  ignore_errors: true
  timeout: "{{ sros_cli_timeout }}"

# --- Bước 4: Thu thập E1/BER Statistics (Nokia 7705 SAR-8) ---
- name: "[{{ inventory_hostname }}] Thu thập E1 BER statistics (SAR-8)"
  raw: "show port 1/1/1 detail"
  register: raw_e1_ber
  ignore_errors: true
  timeout: "{{ sros_cli_timeout }}"
  when: model is defined and model == "7705_SAR-8"

# --- Bước 5: Thu thập OSPF Neighbor Status ---
- name: "[{{ inventory_hostname }}] Thu thập OSPF neighbors"
  raw: "{{ sros_commands.ospf_neighbors }}"
  register: raw_ospf_neighbors
  ignore_errors: true
  timeout: "{{ sros_cli_timeout }}"

# --- Bước 6: Thu thập SAA Latency/Jitter ---
- name: "[{{ inventory_hostname }}] Thu thập SAA test results (Latency/Jitter)"
  raw: "{{ sros_commands.saa_results | replace('{test_name}', saa_test_prefix + '-' + inventory_hostname) }}"
  register: raw_saa_results
  ignore_errors: true
  timeout: "{{ sros_cli_timeout }}"

# --- Bước 7: Thu thập Router Interface (System IP) ---
- name: "[{{ inventory_hostname }}] Thu thập system interface (Loopback/Router-ID)"
  raw: "{{ sros_commands.system_iface }}"
  register: raw_system_iface
  ignore_errors: true
  timeout: "{{ sros_cli_timeout }}"

# --- Bước 8: Thu thập MPLS LSP Status ---
- name: "[{{ inventory_hostname }}] Thu thập MPLS LSP status"
  raw: "{{ sros_commands.mpls_lsp }}"
  register: raw_mpls_lsp
  ignore_errors: true
  timeout: "{{ sros_cli_timeout }}"

# --- Bước 9: Parse và lưu kết quả ---
- name: "[{{ inventory_hostname }}] Tổng hợp kết quả thu thập"
  set_fact:
    device_metrics:
      hostname:        "{{ inventory_hostname }}"
      host_ip:         "{{ ansible_host }}"
      site:            "{{ site | default('UNKNOWN') }}"
      model:           "{{ model | default('UNKNOWN') }}"
      device_role:     "{{ device_role | default('UNKNOWN') }}"
      collected_at:    "{{ ansible_date_time.iso8601 }}"
      system_info:     "{{ raw_system_info.stdout | default('N/A') }}"
      port_summary:    "{{ raw_port_summary.stdout | default('N/A') }}"
      ospf_neighbors:  "{{ raw_ospf_neighbors.stdout | default('N/A') }}"
      saa_results:     "{{ raw_saa_results.stdout | default('N/A') }}"
      mpls_lsp:        "{{ raw_mpls_lsp.stdout | default('N/A') }}"
      e1_ber:          "{{ raw_e1_ber.stdout | default('N/A (not SAR-8 or N/A)') }}"
      system_iface:    "{{ raw_system_iface.stdout | default('N/A') }}"
      collection_status: "{{ 'SUCCESS' if not raw_port_summary.failed | default(false) else 'PARTIAL' }}"

# --- Bước 10: Phân tích trạng thái port ---
- name: "[{{ inventory_hostname }}] Phân tích port DOWN"
  set_fact:
    ports_down: "{{ raw_port_summary.stdout | default('') | regex_findall('([0-9]+/[0-9]+/[0-9]+).*Down') }}"
    ports_up:   "{{ raw_port_summary.stdout | default('') | regex_findall('([0-9]+/[0-9]+/[0-9]+).*Up') }}"

- name: "[{{ inventory_hostname }}] Cảnh báo nếu có port ISP bị DOWN"
  debug:
    msg: >-
      ⚠️  CẢNH BÁO: {{ inventory_hostname }} tại site {{ site | default('N/A') }}
      có {{ ports_down | length }} cổng DOWN: {{ ports_down | join(', ') }}
  when: ports_down | length > 0

# --- Bước 11: Lưu kết quả ra file JSON ---
- name: "[{{ inventory_hostname }}] Lưu metrics ra file JSON"
  copy:
    content: "{{ device_metrics | to_nice_json }}"
    dest: "{{ report_base_dir }}/{{ report_date }}/raw/{{ inventory_hostname }}_{{ report_time }}.json"
  delegate_to: localhost
  become: false
  ignore_errors: true
