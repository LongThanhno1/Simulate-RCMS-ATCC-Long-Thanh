---
# ============================================================
# Playbook 01: Thu thập metrics từ Nokia SR OS
# Mục đích: SSH vào các router truyền dẫn, thu thập BER/Jitter/
#           Latency/Port Status và lưu về Control Node
# Lịch chạy: Ansible-cron mỗi giờ hoặc đầu ca sáng 06:00
# Sử dụng: ansible-playbook -i hosts.ini playbooks/01_collect_metrics.yml
#           Chỉ lab:   --limit lab_simulation
#           Chỉ remote: --limit all_remote
# ============================================================

- name: "VATM | Thu thập metrics từ Nokia SR OS - Production"
  hosts: nokia_sros
  gather_facts: false
  serial: 5          # Xử lý 5 thiết bị song song (tránh quá tải)
  max_fail_percentage: 50  # Tiếp tục ngay cả khi < 50% thiết bị fail

  pre_tasks:
    - name: "Tạo thư mục lưu báo cáo trên Control Node"
      file:
        path: "{{ report_base_dir }}/{{ report_date }}/raw"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      become: false

    - name: "Ghi nhận thời gian bắt đầu thu thập"
      set_fact:
        collection_start: "{{ ansible_date_time.epoch }}"
      delegate_to: localhost

  roles:
    - nokia_sros_collector

  post_tasks:
    - name: "Tổng kết: Số thiết bị thành công"
      debug:
        msg: "Đã thu thập xong {{ ansible_play_hosts_all | length }} thiết bị"
      run_once: true
      delegate_to: localhost


- name: "VATM | Thu thập metrics từ Lab Simulation (Ubuntu VMs)"
  hosts: lab_simulation
  gather_facts: true
  serial: 5

  pre_tasks:
    - name: "Tạo thư mục báo cáo"
      file:
        path: "{{ report_base_dir }}/{{ report_date }}/raw"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      become: false

  tasks:
    - name: "[LAB] Lấy thông tin hệ thống"
      command: "uname -a"
      register: lab_sys_info
      ignore_errors: true

    - name: "[LAB] Lấy thống kê interface"
      command: "cat /proc/net/dev"
      register: lab_iface_stats
      ignore_errors: true

    - name: "[LAB] Test latency đến gateway"
      command: "ping -c 10 -i 0.2 192.168.100.1"
      register: lab_latency
      ignore_errors: true

    - name: "[LAB] Lấy SNMP counters (simulate Nokia OIDs)"
      command: "snmpget -v2c -c {{ snmp_community }} localhost IF-MIB::ifInOctets.1 IF-MIB::ifOutOctets.1 IF-MIB::ifInErrors.1"
      register: lab_snmp
      ignore_errors: true

    - name: "[LAB] Tổng hợp kết quả lab"
      set_fact:
        device_metrics:
          hostname:     "{{ inventory_hostname }}"
          host_ip:      "{{ ansible_host }}"
          sim_device:   "{{ sim_device | default('UNKNOWN') }}"
          site:         "LAB_SIMULATION"
          model:        "Ubuntu_22.04_snmpd"
          collected_at: "{{ ansible_date_time.iso8601 }}"
          sys_info:     "{{ lab_sys_info.stdout | default('N/A') }}"
          iface_stats:  "{{ lab_iface_stats.stdout | default('N/A') }}"
          ping_result:  "{{ lab_latency.stdout_lines[-2:] | join(' ') | default('N/A') }}"
          snmp_result:  "{{ lab_snmp.stdout | default('N/A') }}"
          collection_status: "{{ 'SUCCESS' if not lab_iface_stats.failed else 'FAIL' }}"

    - name: "[LAB] Parse latency từ ping output"
      set_fact:
        lab_latency_parsed: "{{ lab_latency.stdout | regex_search('rtt min/avg/max/mdev = ([0-9.]+)/([0-9.]+)/([0-9.]+)/([0-9.]+)', '\\2') | first | default('N/A') }}"
      ignore_errors: true

    - name: "[LAB] Cảnh báo nếu latency vượt ngưỡng"
      debug:
        msg: "⚠️ LAB CẢNH BÁO: {{ inventory_hostname }} latency {{ lab_latency_parsed }}ms > ngưỡng {{ thresholds.latency_warn_ms }}ms"
      when:
        - lab_latency_parsed != 'N/A'
        - lab_latency_parsed | float > thresholds.latency_warn_ms

    - name: "[LAB] Lưu kết quả ra file JSON"
      copy:
        content: "{{ device_metrics | to_nice_json }}"
        dest: "{{ report_base_dir }}/{{ report_date }}/raw/{{ inventory_hostname }}_{{ report_time }}.json"
      delegate_to: localhost
      become: false
      ignore_errors: true
