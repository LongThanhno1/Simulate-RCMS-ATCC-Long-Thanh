# ============================================================
# PLAY 4: PRODUCTION — RCMS UBVHF → Ping → T6-TRV (TWR)
# ============================================================
- name: "[PROD-UBVHF] Đo Jitter/Latency/Loss từ RCMS UBVHF → T6-TRV"
  hosts: rcms_ubvhf
  gather_facts: false
  run_once: false

  vars:
    pushgateway_url: "http://10.60.0.50:9091"  # TODO: Thay IP thực monitoring server
    ping_count: 20
    ping_interval: "0.05"
    t6trv_targets:
      - { name: "TWR-T6TRV-01", ip: "10.60.11.1", redundancy: "main",    freq: "N/A", slot: "1" }
      - { name: "TWR-T6TRV-02", ip: "10.60.11.2", redundancy: "main",    freq: "N/A", slot: "2" }
      - { name: "TWR-T6TRV-03", ip: "10.60.11.3", redundancy: "main",    freq: "N/A", slot: "3" }
      - { name: "TWR-T6TRV-04", ip: "10.60.11.4", redundancy: "main",    freq: "N/A", slot: "4" }
      - { name: "TWR-T6TRV-05", ip: "10.60.11.5", redundancy: "main",    freq: "N/A", slot: "5" }
      - { name: "TWR-T6TRV-06", ip: "10.60.11.6", redundancy: "main",    freq: "121.500", slot: "6" }

  tasks:
    - name: "[UBVHF] Ping từ {{ inventory_hostname }} → {{ item.name }} ({{ item.ip }})"
      shell: >
        ping -c {{ ping_count }} -i {{ ping_interval }} -W 1 {{ item.ip }} 2>&1
      register: ubvhf_ping_results
