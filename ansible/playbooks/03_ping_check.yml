             | first | default('0') | float | round(3) }}
        _loss: >-
          {{ item.stdout
             | regex_search('([0-9.]+)% packet loss', '\1')
             | first | default('100') | float | round(2) }}
        _up: "{{ 0 if (item.rc | default(1)) != 0 else 1 }}"
      uri:
