    - name: "[UBVHF] Parse + Push metrics → Pushgateway cho {{ item.item.name }}"
      vars:
        _latency: >-
          {{ item.stdout
             | regex_search('rtt min/avg/max/mdev = [0-9.]+/([0-9.]+)/[0-9.]+/[0-9.]+', '\1')
             | first | default('0') | float | round(3) }}
        _jitter: >-
          {{ item.stdout
             | regex_search('rtt min/avg/max/mdev = [0-9.]+/[0-9.]+/[0-9.]+/([0-9.]+)', '\1')
             | first | default('0') | float | round(3) }}
        _loss: >-
          {{ item.stdout
             | regex_search('([0-9.]+)% packet loss', '\1')
             | first | default('100') | float | round(2) }}
        _up: "{{ 0 if (item.rc | default(1)) != 0 else 1 }}"
      uri:
        url: >-
          {{ pushgateway_url }}/metrics/job/vatm_ping_check/instance/{{ item.item.name }}
        method: POST
        body: |
          # HELP vatm_ping_latency_ms Avg ICMP RTT (ms). ED-137 ref: < 200ms RTT
          # TYPE vatm_ping_latency_ms gauge
          vatm_ping_latency_ms{site="UBVHF_TWR",device="T6-TRV",host="{{ item.item.name }}",redundancy="{{ item.item.redundancy }}",freq="{{ item.item.freq }}"} {{ _latency }}
          # HELP vatm_ping_jitter_ms ICMP RTT mdev (ms). ED-137 ref: < 20ms
          # TYPE vatm_ping_jitter_ms gauge
          vatm_ping_jitter_ms{site="UBVHF_TWR",device="T6-TRV",host="{{ item.item.name }}",redundancy="{{ item.item.redundancy }}",freq="{{ item.item.freq }}"} {{ _jitter }}
          # HELP vatm_ping_loss_percent ICMP packet loss percent. ED-137 ref: < 1%
          # TYPE vatm_ping_loss_percent gauge
          vatm_ping_loss_percent{site="UBVHF_TWR",device="T6-TRV",host="{{ item.item.name }}",redundancy="{{ item.item.redundancy }}",freq="{{ item.item.freq }}"} {{ _loss }}
          # HELP vatm_ping_up ICMP reachability: 1=UP, 0=DOWN
          # TYPE vatm_ping_up gauge
          vatm_ping_up{site="UBVHF_TWR",device="T6-TRV",host="{{ item.item.name }}",redundancy="{{ item.item.redundancy }}",freq="{{ item.item.freq }}"} {{ _up }}
        body_format: raw
        headers:
          Content-Type: "text/plain; version=0.0.4; charset=utf-8"
        status_code: [200, 202]
      loop: "{{ ubvhf_ping_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      delegate_to: localhost
      become: false
      ignore_errors: true

    - name: "[UBVHF] 📊 Tóm tắt T6-TRV ping results"
      debug:
        msg: >-
          {{ item.item.name }} {{ item.item.ip }} (slot {{ item.item.slot }}) |
          Loss={{ item.stdout | regex_search('([0-9.]+)% packet loss', '\1') | first | default('?') }}%
          Avg={{ item.stdout | regex_search('rtt min/avg/max/mdev = [0-9.]+/([0-9.]+)', '\1') | first | default('?') }}ms
      loop: "{{ ubvhf_ping_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
