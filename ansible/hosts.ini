t6tv_standby

[vhf_rx:children]
t6rv_main
t6rv_standby

[vhf_ubvhf:children]
t6trv_ubvhf

[all_t6_radios:children]
vhf_tx
vhf_rx
vhf_ubvhf

[all_rcms:children]
rcms_tx
rcms_rx
rcms_ubvhf

[all_switches:children]
