# ============================================================
# NHÓM 1: RCMS / LCMS Workstations (HP Z1 G9)
# Ansible SSH vào đây để chạy playbook đo kiểm
# ============================================================

[rcms_tx]
TX-VHF-RCMS   ansible_host=10.60.7.98  ansible_user=vatm  site=TX_Station  role=rcms_monitor
TX-VHF-LCMS   ansible_host=10.60.7.65  ansible_user=vatm  site=TX_Station  role=lcms_local

[rcms_rx]
RX-VHF-RCMS   ansible_host=10.60.7.97  ansible_user=vatm  site=RX_Station  role=rcms_monitor
RX-VHF-LCMS   ansible_host=10.60.6.65  ansible_user=vatm  site=RX_Station  role=lcms_local

[rcms_ubvhf]
UBVHF-RCMS    ansible_host=10.60.11.30  ansible_user=vatm  site=UBVHF_TWR   role=rcms_monitor
UBVHF-LCMS    ansible_host=10.60.11.29  ansible_user=vatm  site=UBVHF_TWR   role=lcms_local

