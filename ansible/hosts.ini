# ============================================================
# Group vars mặc định
# ============================================================
[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ConnectTimeout=5'
ansible_become=yes
ansible_become_method=sudo
snmp_community=vatm_ro
snmp_version=2c
