[defaults]
# ============================================================
# VATM ATCC Long Thành - Ansible Configuration
# Dự án: Giám sát đường truyền từ xa
# Phiên bản: 1.0 | 2025-04
# ============================================================

inventory            = hosts.ini
remote_user          = admin
host_key_checking    = False
timeout              = 30
gathering            = smart
fact_caching         = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Logging
log_path             = /var/log/ansible/vatm_collect.log

# Retry
retry_files_enabled  = True
retry_files_save_path = /tmp/ansible_retry

# Output
stdout_callback      = yaml
callbacks_enabled    = timer, profile_tasks

[ssh_connection]
ssh_args             = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20
pipelining           = True
control_path         = /tmp/ansible-ssh-%%h-%%p-%%r

[persistent_connection]
connect_timeout      = 30
command_timeout      = 60
